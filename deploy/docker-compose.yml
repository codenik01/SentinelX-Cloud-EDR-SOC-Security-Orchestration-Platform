version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sentinelx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinelx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinelx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinelx-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile.server
    container_name: sentinelx-server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sentinelx?sslmode=disable
      REDIS_URL: redis:6379
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: ../deploy/Dockerfile.dashboard
    container_name: sentinelx-dashboard
    ports:
      - "3000:80"
    depends_on:
      - server

  agent-web-prod:
    build:
      context: ../agent
      dockerfile: ../deploy/Dockerfile.agent
    container_name: sentinelx-agent-prod-01
    environment:
      SENTINELX_API_URL: http://server:8080
      SENTINELX_HOST_ID: prod-01
      SENTINELX_HOSTNAME: prod-web-01
      SENTINELX_OS: linux
      SENTINELX_MOCK_MODE: "true"
      SENTINELX_POLL_INTERVAL_SEC: 5
    depends_on:
      - server

  agent-db-prod:
    build:
      context: ../agent
      dockerfile: ../deploy/Dockerfile.agent
    container_name: sentinelx-agent-db-02
    environment:
      SENTINELX_API_URL: http://server:8080
      SENTINELX_HOST_ID: db-02
      SENTINELX_HOSTNAME: prod-db-02
      SENTINELX_OS: linux
      SENTINELX_MOCK_MODE: "true"
      SENTINELX_POLL_INTERVAL_SEC: 7
    depends_on:
      - server

volumes:
  pgdata:
